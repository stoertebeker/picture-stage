name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: picstage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d picstage_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app/

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/picstage_test
          SECRET_KEY: test-secret-key-not-for-production
          HMAC_SECRET_KEY: test-hmac-key-not-for-production
          STORAGE_BACKEND: local
          UPLOAD_DIR: /tmp/picstage-test-uploads
        run: pytest --cov=app --cov-report=term-missing
