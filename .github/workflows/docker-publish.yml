name: Docker Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # Pfad-Gate: Auf main nur bauen, wenn build-relevante Dateien geaendert
  # wurden. Versions-Tags v* bauen IMMER (Path-Filter wird bei Tags ignoriert).
  changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: >-
        ${{ startsWith(github.ref, 'refs/tags/v')
            || steps.filter.outputs.build == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - 'app/**'
              - 'alembic/**'
              - 'frontend/**'
              - 'tests/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/ci.yml'

  # Vorgelagertes Gate: lint + mypy + pytest. Image wird nur gebaut,
  # wenn die CI gruen ist (kein Build aus rotem Code, auch nicht :dev).
  ci:
    needs: changes
    if: needs.changes.outputs.should-build == 'true'
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [changes, ci]
    if: needs.changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: stoertebeker2k/picture-stage
          # main-Commits -> gleitendes "dev" + "sha-<hash>" (Test-Server zieht :dev).
          # Versions-Tags v* -> semver + "latest" (latest=auto, nur bei Release-Tags).
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Compute asset version (build timestamp)
        id: assetver
        run: echo "value=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ASSET_VERSION=${{ steps.assetver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
