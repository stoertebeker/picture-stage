name: Docker Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # Vorgelagertes Gate: lint + mypy + pytest. Image wird nur gebaut,
  # wenn die CI gruen ist (kein Build aus rotem Code, auch nicht :dev).
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: stoertebeker2k/picture-stage
          # main-Commits -> gleitendes "dev" + "sha-<hash>" (Test-Server zieht :dev).
          # Versions-Tags v* -> semver + "latest" (latest=auto, nur bei Release-Tags).
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
