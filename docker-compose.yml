services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picstage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picstage}
      POSTGRES_DB: ${POSTGRES_DB:-picstage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picstage} -d ${POSTGRES_DB:-picstage}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: stoertebeker2k/picture-stage:0.4.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
      - ./legal:/data/legal:ro
    env_file:
      - .env

volumes:
  pgdata:
  uploads:
