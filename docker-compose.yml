services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picstage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picstage}
      POSTGRES_DB: ${POSTGRES_DB:-picstage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picstage} -d ${POSTGRES_DB:-picstage}"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://picstage:picstage@db:5432/picstage}
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
    env_file:
      - .env

volumes:
  pgdata:
  uploads:
