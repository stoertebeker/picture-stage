{% extends "auth_base.html" %}

{% block title %}{{ t('auth.verify_title') }}{% endblock %}

{% block auth_card %}
<div class="w-full bg-surface-raised border border-border-subtle rounded-lg shadow-lg p-8 flex flex-col gap-6">

    {% if success %}
    <div role="status"
         class="px-4 py-3 rounded-md border border-status-success/40 bg-status-success/10 text-sm text-text-primary text-center">
        {{ t('auth.verify_success') }}
    </div>
    {% else %}
    <div role="alert"
         class="px-4 py-3 rounded-md border border-status-danger/40 bg-status-danger/10 text-sm text-status-danger-text text-center">
        {{ t(error) }}
    </div>
    {% endif %}

    <p class="text-center text-sm text-text-secondary">
        <a href="/login" class="text-accent hover:text-accent-hover hover:underline focus:outline-none focus-visible:ring focus-visible:ring-focus rounded">{{ t('auth.back_to_login') }}</a>
    </p>
</div>
{% endblock %}
