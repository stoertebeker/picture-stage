<div x-show="showCompleteModal"
     x-transition
     class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     style="display: none;">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 max-w-md w-full mx-4"
         @click.outside="showCompleteModal = false">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">Bewertung abschließen?</h3>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-6">
            Du hast <span x-text="selectedCount" class="font-medium"></span> von
            <span x-text="totalImages" class="font-medium"></span> Bildern ausgewählt und
            <span x-text="favoritedCount" class="font-medium"></span> als Favoriten markiert.
            Nach dem Abschließen können keine weiteren Änderungen vorgenommen werden.
        </p>
        <div class="flex justify-end gap-3">
            <button @click="showCompleteModal = false"
                    class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors text-sm">
                Abbrechen
            </button>
            <button @click="completeReview()"
                    class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors text-sm">
                Bewertung abschließen
            </button>
        </div>
    </div>
</div>
