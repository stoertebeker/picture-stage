<div x-show="showCompleteModal"
     x-transition
     class="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     style="display: none;">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 max-w-md w-full mx-4"
         @click.outside="showCompleteModal = false">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">{{ t('guest.complete_title') }}</h3>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-6"
           x-text="'{{ t('guest.complete_text') }}'.replace('{selected}', selectedCount).replace('{total}', totalImages).replace('{favorited}', favoritedCount)">
        </p>
        <div class="flex justify-end gap-3">
            <button @click="showCompleteModal = false"
                    class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors text-sm">
                {{ t('guest.complete_cancel') }}
            </button>
            <button @click="completeReview()"
                    class="px-4 py-2 bg-accent hover:bg-accent-hover text-text-on-accent font-medium rounded-lg transition-colors text-sm">
                {{ t('guest.complete_confirm') }}
            </button>
        </div>
    </div>
</div>
