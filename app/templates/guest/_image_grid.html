{% if images %}
<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2 sm:gap-3">
    {% for img in images %}
    <div class="group relative aspect-[4/5] overflow-hidden rounded-md"
         :class="images[{{ loop.index0 }}]?.selected ? 'ring-2 ring-inset ring-accent' : ''">
        <button type="button"
                @click="openLightbox({{ loop.index0 }})"
                class="absolute inset-0 focus:outline-none focus-visible:ring focus-visible:ring-focus">
            <img src="{{ img.thumb_md_url or img.thumb_sm_url }}"
                 alt="{{ img.filename }}"
                 loading="lazy"
                 class="w-full h-full object-cover">

            <!-- Hover ring (when not selected) -->
            <span class="absolute inset-0 ring-1 ring-inset ring-transparent group-hover:ring-text-primary/30 transition-all"
                  x-show="!images[{{ loop.index0 }}]?.selected"></span>

            <!-- Selected check badge (top-left, persistent) -->
            <template x-if="images[{{ loop.index0 }}]?.selected">
                <span class="absolute top-2 left-2">
                    <span class="flex h-6 w-6 items-center justify-center rounded-full bg-accent text-text-on-accent shadow">
                        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                    </span>
                </span>
            </template>
        </button>

        <!-- Selection toggle (bottom-left, only on hover when unselected) -->
        <button type="button"
                @click.stop="toggleSelect('{{ img.id }}')"
                x-show="!images[{{ loop.index0 }}]?.selected"
                class="absolute bottom-2 left-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity h-7 w-7 rounded-full bg-black/50 hover:bg-accent text-white flex items-center justify-center"
                aria-label="{{ t('guest.lightbox_select') }}">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
        </button>

        <!-- Deselect toggle (bottom-left, when selected) -->
        <button type="button"
                @click.stop="toggleSelect('{{ img.id }}')"
                x-show="images[{{ loop.index0 }}]?.selected"
                class="absolute bottom-2 left-2 z-10 h-7 w-7 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"
                aria-label="{{ t('guest.lightbox_selected') }}"
                style="display: none;">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <!-- Favorite heart filled when set -->
        <template x-if="images[{{ loop.index0 }}]?.favorited">
            <button type="button"
                    @click.stop="toggleFavorite('{{ img.id }}')"
                    class="absolute top-2 right-2 z-10 text-favorite drop-shadow-md"
                    aria-label="{{ t('guest.lightbox_favorited') }}">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 21s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.5-7 10-7 10z"/>
                </svg>
            </button>
        </template>

        <!-- Favorite outline only on hover (when not favourited) -->
        <button type="button"
                @click.stop="toggleFavorite('{{ img.id }}')"
                x-show="!images[{{ loop.index0 }}]?.favorited"
                class="absolute top-2 right-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity text-white drop-shadow-md hover:text-favorite"
                aria-label="{{ t('guest.lightbox_favorite') }}">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
{% from "_macros/empty.html" import empty_state, icon_image %}
{{ empty_state(icon=icon_image(), title=t('guest.no_images')) }}
{% endif %}
