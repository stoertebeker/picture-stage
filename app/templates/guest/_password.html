<div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 text-center">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">{{ t('guest.password_title') }}</h2>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">{{ t('guest.password_text') }}</p>

        {% if error_key %}
        <div class="bg-red-100 dark:bg-red-900 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-200 px-4 py-2 rounded mb-4 text-sm">
            {{ t(error_key) }}
        </div>
        {% endif %}

        <form method="post"
              action="/g/{{ token }}/verify-password"
              hx-post="/g/{{ token }}/verify-password"
              hx-target="#password-section"
              hx-swap="innerHTML"
              class="space-y-4">
            <input type="password"
                   name="password"
                   required
                   autofocus
                   placeholder="{{ t('guest.password_placeholder') }}"
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 text-center">
            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
                {{ t('guest.password_submit') }}
            </button>
        </form>
    </div>
</div>
