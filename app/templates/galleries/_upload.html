<div x-data="uploadZone" class="relative">
    <form method="post"
          action="/galleries/{{ gallery.id }}/upload"
          enctype="multipart/form-data"
          hx-post="/galleries/{{ gallery.id }}/upload"
          hx-target="#image-grid"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          x-ref="uploadForm"
          @htmx:xhr:progress.window="onProgress($event)"
          @htmx:after-request.window="uploadProgress = 0; uploading = false">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="rounded-md border border-dashed px-5 py-8 text-center transition-colors"
             :class="dragOver ? 'border-accent bg-surface-sunken' : 'border-border-strong bg-surface-base hover:border-accent'"
             @dragover.prevent="dragOver = true"
             @dragleave.prevent="dragOver = false"
             @drop.prevent="handleDrop($event)">
            <svg class="mx-auto mb-3 h-10 w-10 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>

            <p class="mb-1 text-sm text-text-secondary">
                {{ t('gallery.upload_drag_text') }}
                <label class="cursor-pointer font-medium text-accent hover:text-accent-hover">
                    {{ t('gallery.upload_browse') }}
                    <input type="file"
                           name="files"
                           multiple
                           accept="image/jpeg,image/png,image/webp"
                           class="hidden"
                           x-ref="fileInput"
                           @change="handleFiles($event)">
                </label>
            </p>
            <p class="text-xs text-text-muted">{{ t('gallery.upload_formats') }}</p>
        </div>
    </form>

    <div x-show="uploading" x-transition class="mt-4">
        <div class="mb-1 flex items-center justify-between text-sm text-text-muted">
            <span>{{ t('gallery.upload_progress') }}</span>
            <span x-text="uploadProgress + '%'"></span>
        </div>
        <div class="h-2 w-full rounded-full bg-surface-sunken">
            <div class="h-2 rounded-full bg-accent transition-all duration-300"
                 :style="'width: ' + uploadProgress + '%'"></div>
        </div>
    </div>
</div>
