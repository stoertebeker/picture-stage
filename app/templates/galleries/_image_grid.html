{% if images %}
<div class="grid grid-cols-2 gap-3 sm:grid-cols-3 xl:grid-cols-5">
    {% for img in images %}
    <article class="group relative overflow-hidden rounded-md border border-border-subtle bg-surface-raised transition-colors hover:border-border-strong"
             data-image-id="{{ img.id }}">
        <button type="button"
                @click.stop="toggleImage('{{ img.id }}')"
                :class="isSelected('{{ img.id }}') ? 'bg-accent border-accent text-text-on-accent opacity-100' : 'bg-surface-overlay border-border-strong text-text-secondary opacity-0 group-hover:opacity-100'"
                class="absolute left-2 top-2 z-10 flex h-7 w-7 items-center justify-center rounded-full border shadow transition"
                aria-label="{{ t('gallery.toggle_image_selection') }}">
            <svg x-show="isSelected('{{ img.id }}')" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
        </button>

        <button type="button"
                class="block aspect-square w-full cursor-pointer bg-surface-sunken"
                @click="openPreview({{ img.previews.get('preview', img.previews.get('thumb_md', '')) | tojson | e }}, {{ img.filename | tojson | e }})">
            {% if img.previews.get('thumb_md') %}
            <img src="{{ img.previews['thumb_md'] }}"
                 alt="{{ img.filename }}"
                 loading="lazy"
                 class="h-full w-full object-cover">
            {% elif img.previews.get('thumb_sm') %}
            <img src="{{ img.previews['thumb_sm'] }}"
                 alt="{{ img.filename }}"
                 loading="lazy"
                 class="h-full w-full object-cover">
            {% else %}
            <span class="flex h-full w-full items-center justify-center bg-surface-sunken">
                <svg class="h-12 w-12 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
                </svg>
            </span>
            {% endif %}
        </button>

        <div class="px-3 py-2">
            <div class="truncate text-xs text-text-secondary" title="{{ img.filename }}">{{ img.filename }}</div>
            <div class="text-xs text-text-muted">#{{ img.sort_order }}</div>
        </div>
    </article>
    {% endfor %}
</div>
{% else %}
<div class="rounded-md border border-border-subtle bg-surface-raised p-8 text-center">
    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-surface-sunken text-accent">
        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5"/>
        </svg>
    </div>
    <h2 class="font-display text-3xl text-text-primary">{{ t('gallery.no_images_title') }}</h2>
    <p class="mx-auto mt-3 max-w-xl text-sm text-text-muted">{{ t('gallery.no_images_text') }}</p>
    <a href="#gallery-upload"
       class="mt-6 inline-flex items-center gap-2 rounded-md bg-accent px-5 py-3 text-sm font-medium text-text-on-accent hover:bg-accent-hover">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        {{ t('gallery.upload_short') }}
    </a>
</div>
{% endif %}
