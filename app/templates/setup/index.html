<!DOCTYPE html>
<html lang="{{ locale }}"
      x-data="{ darkMode: localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches) }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{{ t('setup.title') }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-8">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-2xl font-bold">{{ t('nav.brand') }}</h1>
                <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')"
                        type="button"
                        class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">
                    <span x-show="!darkMode">{{ t('nav.dark_mode') }}</span>
                    <span x-show="darkMode">{{ t('nav.light_mode') }}</span>
                </button>
            </div>

            <p class="text-sm text-gray-600 dark:text-gray-400 mb-6">
                {{ t('setup.subtitle') }}
            </p>

            {% if error %}
            <div class="bg-red-100 dark:bg-red-900 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-200 px-4 py-3 rounded mb-4" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/setup" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ t('auth.email_label') }}</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ t('auth.password_label') }}</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="password_confirm" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{ t('auth.confirm_password_label') }}</label>
                    <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password" minlength="8"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800">
                    {{ t('setup.create_admin') }}
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/alpine.min.js"></script>
</body>
</html>
